services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: pdf-vision-api
    expose:
      - "8000"
    env_file:
      - .env

  nginx:
    image: nginx:stable-alpine
    container_name: pdf-vision-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
